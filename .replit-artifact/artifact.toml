kind = "web"
previewPath = "/"
title = "Art Portfolio"
version = "1.0.0"
id = "artifacts/art-portfolio"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21215

[services.development]
run = "pnpm --filter @workspace/art-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/art-portfolio", "run", "build" ]
serve = "static"
publicDir = "artifacts/art-portfolio/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21215"
BASE_PATH = "/"
